<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LynkApp - Sign In</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 100%;
    max-width: 440px;
    padding: 40px 32px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    backdrop-filter: blur(20px);
    color: #fff;
    margin: 20px;
  }

  /* Logo */
  .logo-wrap { text-align: center; margin-bottom: 36px; }
  .logo-box {
    width: 90px; height: 90px;
    background: linear-gradient(135deg, #4f46e5, #ec4899);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    margin: 0 auto 16px;
    box-shadow: 0 16px 48px rgba(79,70,229,0.45);
  }
  .app-name {
    font-size: 34px; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4f46e5, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline { font-size: 14px; color: #94a3b8; margin-top: 6px; }

  /* Tabs */
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1; padding: 11px; text-align: center;
    border-radius: 9px; font-size: 14px; font-weight: 600;
    color: #94a3b8; cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: #4f46e5; color: #fff; }

  /* Form */
  .form { display: none; }
  .form.active { display: block; }

  .field { margin-bottom: 14px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .input-wrap {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 0 14px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
  .input-icon { font-size: 18px; margin-right: 10px; }
  .input-wrap input {
    flex: 1; background: none; border: none; padding: 15px 0;
    font-size: 14px; color: #fff; outline: none;
  }
  .input-wrap input::placeholder { color: #64748b; }
  .eye { font-size: 18px; cursor: pointer; color: #94a3b8; padding: 6px; }

  /* Options row */
  .opts { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .chk-wrap { display: flex; align-items: center; cursor: pointer; gap: 8px; font-size: 13px; color: #94a3b8; }
  .chk {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 11px;
  }
  .chk.on { background: #4f46e5; border-color: #4f46e5; }
  .forgot { font-size: 13px; color: #4f46e5; font-weight: 600; cursor: pointer; }
  .forgot:hover { text-decoration: underline; }

  /* Error */
  .err-box {
    background: rgba(255,80,80,0.12); border: 1px solid rgba(255,100,100,0.35);
    color: #f87171; border-radius: 10px; padding: 10px 14px;
    font-size: 13px; text-align: center; margin-bottom: 12px; display: none;
  }

  /* Buttons */
  .btn-primary {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #4f46e5, #ec4899);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; color: #fff; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 12px;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-demo {
    width: 100%; padding: 13px;
    background: transparent; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; font-size: 13px; color: rgba(255,255,255,0.65);
    cursor: pointer; transition: all 0.2s;
  }
  .btn-demo:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.85); }

  /* Divider */
  .divider { display: flex; align-items: center; margin: 20px 0; }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
  .divider-txt { padding: 0 14px; font-size: 13px; color: #64748b; }

  /* Social */
  .social { display: flex; justify-content: center; gap: 14px; margin-bottom: 24px; }
  .soc-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: all 0.2s;
    font-weight: 700; color: #fff;
  }
  .soc-btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }

  /* Footer */
  .footer { text-align: center; font-size: 13px; color: #94a3b8; }
  .footer-link { color: #4f46e5; font-weight: 600; cursor: pointer; }
  .footer-link:hover { text-decoration: underline; }

  /* Pref section (register) */
  .pref-box {
    background: rgba(255,255,255,0.04); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .pref-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #94a3b8; }
  .toggle-row { display: flex; align-items: flex-start; gap: 12px; }
  .toggle-chk {
    width: 18px; height: 18px; margin-top: 2px; border-radius: 4px;
    background: #4f46e5; border: 2px solid #4f46e5; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 10px;
    cursor: pointer;
  }
  .toggle-info .t { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .toggle-info .d { font-size: 12px; color: #94a3b8; line-height: 1.4; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; right: 24px;
    background: #1e293b; border: 1px solid rgba(255,255,255,0.12);
    color: #fff; padding: 12px 20px; border-radius: 24px;
    font-size: 14px; font-weight: 500;
    transform: translateX(200%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(0); }
</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-box">🔗</div>
    <div class="app-name">Lynkapp</div>
    <div class="tagline">Connect • Share • Discover</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- ── SIGN IN FORM ── -->
  <div class="form active" id="form-signin">
    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="si-email" placeholder="Email address">
      </div>
    </div>
    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="si-pass" placeholder="Password">
        <span class="eye" onclick="togglePwd('si-pass',this)">👁️</span>
      </div>
    </div>
    <div class="opts">
      <div class="chk-wrap" onclick="toggleChk(this)">
        <div class="chk" id="remember"></div>
        <span>Remember me</span>
      </div>
      <span class="forgot" onclick="forgotPwd()">Forgot password?</span>
    </div>
    <div class="err-box" id="si-err"></div>
    <button class="btn-primary" onclick="handleSignIn()">Sign In</button>
    <button class="btn-demo" onclick="goDemo()">👁️ View Demo (Skip Login)</button>
  </div>

  <!-- ── SIGN UP FORM ── -->
  <div class="form" id="form-signup">
    <div class="input-row">
      <div class="field">
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="su-first" placeholder="First name">
        </div>
      </div>
      <div class="field">
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="su-last" placeholder="Last name">
        </div>
      </div>
    </div>
    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">@</span>
        <input type="text" id="su-user" placeholder="Username">
      </div>
    </div>
    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="su-email" placeholder="Email address">
      </div>
    </div>
    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="su-pass" placeholder="Password">
        <span class="eye" onclick="togglePwd('su-pass',this)">👁️</span>
      </div>
    </div>
    <div class="field">
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="su-confirm" placeholder="Confirm password">
      </div>
    </div>
    <div class="pref-box">
      <div class="pref-title">Account Preferences</div>
      <div class="toggle-row">
        <div class="toggle-chk" id="dating-chk" onclick="toggleDating()">✓</div>
        <div class="toggle-info">
          <div class="t">Enable Dating Features</div>
          <div class="d">Access matching, profiles, and meaningful connections</div>
        </div>
      </div>
    </div>
    <div class="err-box" id="su-err"></div>
    <button class="btn-primary" onclick="handleSignUp()">Create Account</button>
  </div>

  <!-- Social -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-txt">or continue with</div>
    <div class="divider-line"></div>
  </div>
  <div class="social">
    <div class="soc-btn" onclick="socialLogin('Google')" title="Google">G</div>
    <div class="soc-btn" onclick="socialLogin('Facebook')" title="Facebook">f</div>
    <div class="soc-btn" onclick="socialLogin('Apple')" title="Apple">🍎</div>
  </div>

  <!-- Footer -->
  <div class="footer" id="footer-text">
    Don't have an account?
    <span class="footer-link" id="footer-link" onclick="switchTab('signup')">Sign up</span>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  var datingOn = true;
  var rememberOn = false;

  // Tab switch
  function switchTab(tab) {
    var signin = document.getElementById('form-signin');
    var signup = document.getElementById('form-signup');
    var tsi = document.getElementById('tab-signin');
    var tsu = document.getElementById('tab-signup');
    var ftxt = document.getElementById('footer-text');
    var flink = document.getElementById('footer-link');

    if (tab === 'signin') {
      signin.classList.add('active'); signup.classList.remove('active');
      tsi.classList.add('active'); tsu.classList.remove('active');
      ftxt.innerHTML = 'Don\'t have an account? <span class="footer-link" id="footer-link" onclick="switchTab(\'signup\')">Sign up</span>';
    } else {
      signup.classList.add('active'); signin.classList.remove('active');
      tsu.classList.add('active'); tsi.classList.remove('active');
      ftxt.innerHTML = 'Already have an account? <span class="footer-link" id="footer-link" onclick="switchTab(\'signin\')">Sign in</span>';
    }
  }

  // Toggle password visibility
  function togglePwd(id, eyeEl) {
    var inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; eyeEl.textContent = '🙈'; }
    else { inp.type = 'password'; eyeEl.textContent = '👁️'; }
  }

  // Toggle remember me checkbox
  function toggleChk(wrap) {
    rememberOn = !rememberOn;
    var chk = wrap.querySelector('.chk');
    if (rememberOn) { chk.classList.add('on'); chk.textContent = '✓'; }
    else { chk.classList.remove('on'); chk.textContent = ''; }
  }

  // Toggle dating preference
  function toggleDating() {
    datingOn = !datingOn;
    var el = document.getElementById('dating-chk');
    el.textContent = datingOn ? '✓' : '';
    el.style.background = datingOn ? '#4f46e5' : 'transparent';
  }

  // Forgot password
  function forgotPwd() {
    var email = document.getElementById('si-email').value.trim();
    if (email) {
      toast('Password reset email sent to ' + email + ' 📧');
    } else {
      showErr('si-err', 'Please enter your email address first.');
    }
  }

  // Sign In
  function handleSignIn() {
    clearErr('si-err');
    var email = document.getElementById('si-email').value.trim();
    var pass  = document.getElementById('si-pass').value;
    if (!email) { showErr('si-err', 'Please enter your email address.'); return; }
    if (!pass)  { showErr('si-err', 'Please enter your password.'); return; }
    if (!email.includes('@')) { showErr('si-err', 'Please enter a valid email address.'); return; }
    toast('Signing in... ⏳');
    setTimeout(function() { goToApp(); }, 1200);
  }

  // Sign Up
  function handleSignUp() {
    clearErr('su-err');
    var first  = document.getElementById('su-first').value.trim();
    var last   = document.getElementById('su-last').value.trim();
    var user   = document.getElementById('su-user').value.trim();
    var email  = document.getElementById('su-email').value.trim();
    var pass   = document.getElementById('su-pass').value;
    var conf   = document.getElementById('su-confirm').value;
    if (!first || !last)  { showErr('su-err', 'Please enter your full name.'); return; }
    if (!user)            { showErr('su-err', 'Please choose a username.'); return; }
    if (!email || !email.includes('@')) { showErr('su-err', 'Please enter a valid email.'); return; }
    if (pass.length < 6) { showErr('su-err', 'Password must be at least 6 characters.'); return; }
    if (pass !== conf)   { showErr('su-err', 'Passwords do not match.'); return; }
    toast('Creating your account... 🎉');
    setTimeout(function() { goToApp(); }, 1400);
  }

  // Social login
  function socialLogin(provider) {
    toast('Signing in with ' + provider + '... ⏳');
    setTimeout(function() { goToApp(); }, 1500);
  }

  // Demo / skip login
  function goDemo() {
    toast('Loading demo... 👀');
    setTimeout(function() { goToApp(); }, 800);
  }

  // Navigate to main app
  function goToApp() {
    // If the main LynkApp is running on port 3031, go there
    // Otherwise stay on this page with a success message
    toast('Welcome to LynkApp! 🎉');
    setTimeout(function() {
      // Try to redirect to the main app
      window.location.href = 'index.html';
    }, 1000);
  }

  // Error helpers
  function showErr(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }
  function clearErr(id) {
    var el = document.getElementById(id);
    el.textContent = ''; el.style.display = 'none';
  }

  // Toast
  var _toastTimer;
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
  }
</script>
</body>
</html>
